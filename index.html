<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Countdown</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-layout">
        <div class="left-section">
            <div class="header">
                <h1 id="title">Mina's Countdown Website</h1>
                <button id="language_button">切換為中文</button>
                <button id="share_button"><i class="fas fa-share-alt"></i></button>
            </div>

            <div class="input-container">
                <div class="input-group">
                    <p id="eventLabel">Event Name</p>
                    <input type="text" id="eventName">
                </div>

                <div class="input-group">
                    <p id="word">Please choose a date</p>
                    <input type="date" id="dateInput" max="2099-12-31">
                </div>

                <div class="input-group">
                    <p id="bgColorLabel">BG Color</p>
                    <input type="color" id="bgColorPicker" value="#ffffff">
                </div>

                <div class="input-group">
                    <p id="lineColorLabel">Line Color</p>
                    <input type="color" id="lineColorPicker" value="#ffb6c1">
                </div>

                <button id="Start_button">Add Countdown</button>
            </div>

            <div id="result"></div>
            <div id="list"></div>
        </div>

        <div class="right-section">
            <div class="slot-machine">
                <div class="slot-window">
                    <div id="slot-list" class="slot-list">
                    </div>
                </div>
                <button id="spin-button">spin</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
